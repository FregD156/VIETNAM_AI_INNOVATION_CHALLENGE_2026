<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Orange rounded square background representing SHB logo base -->
  <rect width="64" height="64" rx="14" fill="#F0631D" />
  
  <!-- Translucent inner circle representing 'circle inside square' philosophy -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.2" />
  
  <!-- Stylized white letter 'S' in the center -->
  <text x="32" y="43" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">S</text>
</svg>